# app.yaml
# =========
# Databricks Apps deployment manifest for Nyaya-Setu.
# Place at the repo root alongside app.py.
#
# Docs: https://docs.databricks.com/en/dev-tools/databricks-apps/index.html

command:
  - python
  - -m
  - streamlit
  - run
  - app.py
  - --server.port=8501
  - --server.address=0.0.0.0
  - --server.headless=true
  - --server.enableCORS=false
  - --server.enableXsrfProtection=false

env:
  # ── Pipeline output location on DBFS ──────────────────────────────────────
  # This is where the 3 pre-built files live (or will be saved via the Upload tab).
  # Change to your Unity Catalog volume path if using UC:
  #   e.g. /Volumes/main/nyaya_setu/output
  - name: OUT_DIR
    value: /dbfs/FileStore/nyaya_setu/output

  - name: INDEX_PATH
    value: /dbfs/FileStore/nyaya_setu/output/faiss_precedents.index

  - name: META_PATH
    value: /dbfs/FileStore/nyaya_setu/output/faiss_metadata.parquet

  - name: BNS_CSV
    value: /dbfs/FileStore/nyaya_setu/output/bns_ipc_mapping.csv

  # ── GROQ API KEY ──────────────────────────────────────────────────────────
  # Set this in Databricks Apps UI:
  #   App → Edit → Environment Variables → Add variable
  # Name:  GROQ_API_KEY
  # Value: gsk_your_actual_key_here
  #
  # DO NOT hard-code the real key in this file and commit it to GitHub.
  # Leave it blank here; set it through the Databricks UI instead.
  - name: GROQ_API_KEY
    value: ""

  # ── Streamlit settings ────────────────────────────────────────────────────
  # Increase if uploading large parquet/index files via the Upload tab
  - name: STREAMLIT_SERVER_MAX_UPLOAD_SIZE
    value: "2000"
